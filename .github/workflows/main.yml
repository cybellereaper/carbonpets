name: Build, Test, and Release

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-test-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run tests and build
        run: ./gradlew clean build

      - name: Publish JARs to GitHub Release
        if: startsWith(github.ref, 'refs/tags/') && github.repository == 'cybellereaper/carbonpets'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          shopt -s nullglob
          jars=(build/libs/*.jar)

          if [ ${#jars[@]} -eq 0 ]; then
            echo "No JAR files found in build/libs"
            exit 1
          fi

          if gh release view "${GITHUB_REF_NAME}" --repo cybellereaper/carbonpets >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" "${jars[@]}" \
              --repo cybellereaper/carbonpets \
              --clobber
          else
            gh release create "${GITHUB_REF_NAME}" "${jars[@]}" \
              --repo cybellereaper/carbonpets \
              --generate-notes \
              --verify-tag
          fi
